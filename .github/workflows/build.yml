name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            artifact: ruhrvibe-linux-x86_64
          - name: Windows x86_64
            os: windows-latest
            artifact: ruhrvibe-windows-x86_64
          - name: macOS universal
            os: macos-latest
            artifact: ruhrvibe-macos-universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcb1-dev libxcb-icccm4-dev libxcb-dri2-0-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcursor-dev libxkbcommon-dev libgl1-mesa-dev libasound2-dev \
            libjack-jackd2-dev

      - name: Build bundle (Linux / Windows)
        if: matrix.os != 'macos-latest'
        run: cargo xtask bundle ruhrvibe --release

      - name: Build universal bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo xtask bundle-universal ruhrvibe --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/bundled/
          if-no-files-found: error
